<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore | Leading Computer & Component Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --st-red: #ef4a23; --st-navy: #081621; }
        body { background-color: #f2f4f8; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: var(--st-navy) !important; padding: 15px 0; }
        .nav-link, .navbar-brand { color: white !important; }
        .search-bar { background: #fff; border-radius: 4px; display: flex; overflow: hidden; }
        .search-bar input { border: none; padding: 8px 15px; width: 300px; outline: none; }
        .search-bar button { background: var(--st-red); border: none; color: white; padding: 0 15px; }
        .product-card { transition: transform 0.2s, box-shadow 0.2s; border-radius: 8px; border: none; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .price-text { color: var(--st-red); font-weight: bold; font-size: 1.1rem; }
        .btn-buy { background: transparent; border: 2px solid #e2e2e2; color: #3749bb; font-weight: 600; transition: 0.3s; }
        .btn-buy:hover { background: #3749bb; color: white; }
        .tag-badge { position: absolute; top: 10px; right: 10px; background: rgba(55, 73, 187, 0.1); color: #3749bb; font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="fa-solid fa-microchip me-2"></i>TECH-SHOP</a>
            
            <div class="search-bar d-none d-md-flex mx-auto">
                <input type="text" placeholder="Search components...">
                <button><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>

            <div class="d-flex align-items-center gap-4 text-white">
                <div class="d-none d-lg-block text-end">
                    <div class="small opacity-75">Welcome, {{ user.preferred_username }}</div>
                    <div class="fw-bold" style="font-size: 0.85rem;">My Account</div>
                </div>
                <a href="/logout" class="btn btn-sm btn-outline-light"><i class="fa-solid fa-power-off"></i></a>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row mb-4 align-items-center">
            <div class="col-6">
                <h4 class="fw-bold m-0 text-dark">Featured Components</h4>
            </div>
            <div class="col-6 text-end">
                <span class="badge bg-white text-dark shadow-sm p-2">Showing 4 Products</span>
            </div>
        </div>

        <div class="row g-4">
            {% for product in products %}
            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="card product-card h-100 p-3 position-relative">
                    <span class="tag-badge">{{ product.tag }}</span>
                    <div class="text-center mb-3">
                        <img src="{{ product.img }}" 
                        alt="{{ product.name }}" 
                        class="img-fluid" 
                        style="max-height: 200px; object-fit: contain;"
                        onerror="this.onerror=null;this.src='https://placehold.co/500x500/081621/FFF?text=Tech+Component';">
                    </div>
                    <div class="card-body p-0 d-flex flex-column">
                        <h6 class="card-title fw-normal mb-3 text-dark" style="height: 40px; overflow: hidden; font-size: 0.95rem;">
                            {{ product.name }}
                        </h6>
                        <div class="mt-auto">
                            <hr class="opacity-10">
                            <p class="price-text mb-3 text-center">{{ product.price }}</p>
                            <button class="btn btn-buy w-100">
                                <i class="fa-solid fa-plus-circle me-1"></i> Buy Now
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
